# Ansible inventory
# Use this file with: ansible-playbook -i hosts.ini setup.yaml

[all]
# ansible_host: control plane public IP (SSH)
# redis_private_ip: private IP for node-to-node internal traffic
node1 ansible_host=NODE1_PUBLIC_IP ansible_user=ubuntu private_ip=NODE1_PRIVATE_IP
node2 ansible_host=NODE2_PUBLIC_IP ansible_user=ubuntu private_ip=NODE2_PRIVATE_IP

[all:vars]
ansible_port=22
ansible_python_interpreter=/usr/bin/python3
# If using SSH key auth, uncomment and adjust:
ansible_ssh_private_key_file=~/.ssh/YOUR_SSH_KEY
