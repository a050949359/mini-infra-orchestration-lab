# Ansible inventory
# Use this file with: ansible-playbook -i hosts.ini setup.yaml

[all]
# ansible_host: control plane public IP (SSH)
# redis_private_ip: private IP for node-to-node internal traffic
node1 ansible_host=192.168.56.11 ansible_user=ubuntu private_ip=10.0.0.143
node2 ansible_host=192.168.56.12 ansible_user=ubuntu private_ip=10.0.0.48

[all:vars]
ansible_port=22
ansible_python_interpreter=/usr/bin/python3
# If using SSH key auth, uncomment and adjust:
ansible_ssh_private_key_file=~/.ssh/oracle_id_rsa
