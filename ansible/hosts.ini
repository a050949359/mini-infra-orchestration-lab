# Ansible inventory
# Use this file with: ansible-playbook -i hosts.ini main.yaml

[all]
# Replace these with your real hosts
node1 ansible_host=192.168.56.11 ansible_user=ubuntu 
node2 ansible_host=192.168.56.12 ansible_user=ubuntu

[all:vars]
ansible_port=22
ansible_python_interpreter=/usr/bin/python3
# If using SSH key auth, uncomment and adjust:
ansible_ssh_private_key_file=~/.ssh/id_rsa
