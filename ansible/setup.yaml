---
- name: Configure common base packages
  hosts: all
  become: true
  gather_facts: true
  vars:
    redis_bind: "127.0.0.1 {{ ansible_facts['default_ipv4']['address'] }}"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name:
          - redis-server
          - rsync
          - snmp
          - snmpd
          - net-tools
          - iproute2
        state: present

    - name: Enable and start Redis
      ansible.builtin.service:
        name: redis-server
        enabled: true
        state: started

    - name: Configure Redis password when provided
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^#?\s*requirepass\s+'
        line: "requirepass {{ redis_password }}"
      when: redis_password | length > 0
      notify: Restart Redis

    - name: Restrict Redis bind address
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^\s*bind\s+'
        line: "bind {{ redis_bind }}"
      notify: Restart Redis

    - name: Ensure Redis protected mode is enabled
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^#?\s*protected-mode\s+'
        line: "protected-mode yes"
      notify: Restart Redis

    - name: Enable and start SNMP daemon
      ansible.builtin.service:
        name: snmpd
        enabled: true
        state: started

  handlers:
    - name: Restart Redis
      ansible.builtin.service:
        name: redis-server
        state: restarted

- name: Configure control and API node
  hosts: node1
  become: true
  gather_facts: false

  tasks:
    - name: Install control node packages
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-venv
          - sqlite3
        state: present

    - name: Show control node setup summary
      ansible.builtin.debug:
        msg: "node1 ready. Run deploy.yaml to deploy the API."

- name: Configure worker node
  hosts: node2
  become: true
  gather_facts: false

  tasks:
    - name: Show worker node setup summary
      ansible.builtin.debug:
        msg: "node2 ready with Redis and SNMP"