---
- name: Configure common base packages
  hosts: all
  become: true
  gather_facts: true
  vars:
    redis_bind: "127.0.0.1 {{ ansible_facts['default_ipv4']['address'] }}"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name:
          - redis-server
          - snmp
          - snmpd
          - net-tools
          - iproute2
        state: present

    - name: Enable and start Redis
      ansible.builtin.service:
        name: redis-server
        enabled: true
        state: started

    - name: Configure Redis password when provided
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^#?\s*requirepass\s+'
        line: "requirepass {{ redis_password }}"
      when: redis_password | length > 0
      notify: Restart Redis

    - name: Restrict Redis bind address
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^\s*bind\s+'
        line: "bind {{ redis_bind }}"
      notify: Restart Redis

    - name: Ensure Redis protected mode is enabled
      ansible.builtin.lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^#?\s*protected-mode\s+'
        line: "protected-mode yes"
      notify: Restart Redis

    - name: Enable and start SNMP daemon
      ansible.builtin.service:
        name: snmpd
        enabled: true
        state: started

  handlers:
    - name: Restart Redis
      ansible.builtin.service:
        name: redis-server
        state: restarted

- name: Configure control and API node
  hosts: node1
  become: true
  gather_facts: false
  vars:
    redis_url: "{{ 'redis://:' ~ redis_password ~ '@127.0.0.1:6379/0' if (redis_password | length > 0) else 'redis://127.0.0.1:6379/0' }}"

  tasks:
    - name: Install control node packages
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-venv
          - sqlite3
        state: present

    - name: Create application venv
      ansible.builtin.command:
        cmd: "python3 -m venv {{ api_venv_path }}"
        creates: "{{ api_venv_path }}/bin/activate"

    - name: Install Flask and Gunicorn in application venv
      ansible.builtin.pip:
        name:
          - flask
          - gunicorn
        virtualenv: "{{ api_venv_path }}"

    - name: Ensure API data directory exists
      ansible.builtin.file:
        path: "{{ api_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure node1 API environment file exists
      ansible.builtin.copy:
        dest: "{{ api_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          JOB_DB_PATH={{ sqlite_db_path }}
          REDIS_URL={{ redis_url }}
          QUEUE_STREAM_KEY={{ queue_stream_key }}

    - name: Create systemd service for node1 API Gunicorn
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ api_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Node1 Flask API Service (Gunicorn)
          After=network.target redis-server.service

          [Service]
          Type=simple
          EnvironmentFile={{ api_env_file }}
          WorkingDirectory={{ api_app_dir }}
          ExecStart={{ api_venv_path }}/bin/gunicorn --workers 2 --bind 0.0.0.0:5000 app:app
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
      register: node1_api_service_unit

    - name: Reload systemd daemon when node1 API unit changes
      ansible.builtin.systemd:
        daemon_reload: true
      when: node1_api_service_unit.changed

    - name: Check if node1 API app exists
      ansible.builtin.stat:
        path: "{{ api_app_dir }}/app.py"
      register: node1_api_app

    - name: Enable and start node1 API Gunicorn service
      ansible.builtin.systemd:
        name: "{{ api_service_name }}"
        enabled: true
        state: started
      when: node1_api_app.stat.exists

    - name: Skip API service start when app not deployed yet
      ansible.builtin.debug:
        msg: "Skip starting {{ api_service_name }}: {{ api_app_dir }}/app.py not found. Run deploy.yaml after setup."
      when: not node1_api_app.stat.exists

    - name: Show control node setup summary
      ansible.builtin.debug:
        msg: "node1 ready with Flask/Gunicorn, Redis, SQLite, SNMP, and venv at {{ api_venv_path }}"

- name: Configure worker node
  hosts: node2
  become: true
  gather_facts: false

  tasks:
    - name: Show worker node setup summary
      ansible.builtin.debug:
        msg: "node2 ready with Redis and SNMP"