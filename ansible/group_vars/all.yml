---
# ── 部署前必填（不可留空，不可 commit 真實值） ────────────────────────────────
#
# redis_password：Redis 認證密碼
# node1_ip：node1 的內網 IP，供 node2 worker 連線 Redis 使用
# node2_ip：node2 的內網 IP，填入 SNMP_NODES（mini-orch-snmp.env.j2）
# api_key：Flask API 端點的認證金鑰（尚未實作，預留給後續 API 認證使用）
redis_password: "REDIS_PASSWORD"
node1_ip: "NODE1_PRIVATE_IP"
node2_ip: "NODE2_PRIVATE_IP"
api_key: "API_KEY"


# ── SNMP 採集設定 ──────────────────────────────────────────────────────────────
# snmp_nodes：格式 "label:ip"，新增節點直接在後面加一行
# snmp_oids：格式 "metric:oid"，新增採集項目直接在後面加一行
snmp_nodes:
  - "node1:127.0.0.1"
  - "node2:{{ node2_ip }}"

snmp_oids:
  - "cpu_load1:1.3.6.1.4.1.2021.10.1.3.1"
  - "mem_total_kb:1.3.6.1.4.1.2021.4.5.0"
  - "mem_avail_kb:1.3.6.1.4.1.2021.4.6.0"
  - "mem_buffer_kb:1.3.6.1.4.1.2021.4.14.0"
  - "mem_cached_kb:1.3.6.1.4.1.2021.4.15.0"

# ─────────────────────────────────────────────────────────────────────────────

api_env_dest: /etc/mini-orch-api.env
snmp_env_dest: /etc/mini-orch-snmp.env
loadtest_env_dest: /etc/mini-orch-loadtest.env
status_consumer_env_dest: /etc/mini-orch-status-consumer.env
publish_failed_checker_env_dest: /etc/mini-orch-publish-failed-checker.env
worker_env_dest: /etc/mini-orch-worker.env

api_venv_path: /opt/mini-orch-venv
api_app_dir: /opt/mini-orch
loadtest_dir: /opt/mini-orch-loadtest

api_service_name: mini-orch-api
loadtest_service_name: mini-orch-loadtest
snmp_collector_service_name: mini-orch-snmp-collector
status_consumer_service_name: mini-orch-status-consumer

api_data_dir: /var/lib/mini-orch
sqlite_db_path: /var/lib/mini-orch/jobs.db
sqlite_backup_dir: /var/backups/mini-orch

api_log_file: /var/log/mini-orch/api.log
status_consumer_log_file: /var/log/mini-orch/status_consumer.log
snmp_collector_log_file: /var/log/mini-orch/snmp_collector.log
loadtest_log_file: /var/log/mini-orch/loadtest.log
publish_failed_checker_log_file: /var/log/mini-orch/publish_failed_checker.log

worker_binary_src: ../node2_worker/bin/mini-orch-worker
worker_binary_dest: /usr/bin/mini-orch-worker
worker_service_name: mini-orch-worker

worker_log_file: /var/log/mini-orch/worker.log

# ── TLS 自簽憑證 ───────────────────────────────────────────────────────────────
api_cert_dir: /etc/mini-orch/certs/api
loadtest_cert_dir: /etc/mini-orch/certs/loadtest
cert_renew_log: /var/log/mini-orch/cert-renew.log
cert_renew_script: /usr/local/bin/mini-orch-cert-renew.sh

