---
# 完整重部署 playbook：涵蓋 node1（Flask API 及相關服務）與 node2（Go worker）。
# 每次執行均為完整流程：停止服務 → 備份資料 → 清除舊檔 → 上傳新版 → 重啟服務。
# 此 playbook 為破壞性操作，不具冪等性。
# 若需 patch 特定功能或零停機更新，請另外撰寫獨立 playbook。

- name: Deploy node1 API service
  hosts: node1
  become: true
  gather_facts: false
  vars:
    redis_url: "{{ 'redis://:' ~ redis_password ~ '@127.0.0.1:6379/0' if (redis_password | length > 0) else 'redis://127.0.0.1:6379/0' }}"
    snmp_redis_url: "{{ 'redis://:' ~ redis_password ~ '@127.0.0.1:6379/1' if (redis_password | length > 0) else 'redis://127.0.0.1:6379/1' }}"

  tasks:
    # ── Backup ────────────────────────────────────────────────────────────
    - name: Ensure SQLite backup directory exists
      ansible.builtin.file:
        path: "{{ sqlite_backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check existing SQLite database
      ansible.builtin.stat:
        path: "{{ sqlite_db_path }}"
      register: sqlite_db_stat

    - name: Backup SQLite database before redeploy
      ansible.builtin.copy:
        src: "{{ sqlite_db_path }}"
        dest: "{{ sqlite_backup_dir }}/jobs-{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}.db"
        remote_src: true
        owner: root
        group: root
        mode: "0640"
      when: sqlite_db_stat.stat.exists

    # ── Stop all services ─────────────────────────────────────────────────
    - name: Stop all node1 services before redeploy
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - "{{ loadtest_service_name }}"
        - "{{ snmp_collector_service_name }}"
        - "{{ status_consumer_service_name }}"
        - "{{ api_service_name }}"
      failed_when: false

    - name: Kill any process listening on port 5000
      ansible.builtin.shell: |
        set -o pipefail
        pids=$(ss -ltnp '( sport = :5000 )' | awk -F 'pid=' 'NR>1 && NF>1 {split($2,a,",|"); print a[1]}' | sort -u)
        if [[ -n "$pids" ]]; then
          kill -9 $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    # ── Directories ───────────────────────────────────────────────────────
    - name: Ensure log directory exists
      ansible.builtin.file:
        path: /var/log/mini-orch
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Remove and recreate app and data directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: "{{ item.state }}"
        owner: root
        group: root
        mode: "{{ item.mode | default('0755') }}"
      loop:
        - { path: "{{ api_app_dir }}",   state: absent }
        - { path: "{{ api_app_dir }}",   state: directory }
        - { path: "{{ api_data_dir }}",  state: absent }
        - { path: "{{ api_data_dir }}",  state: directory }

    # ── Upload source ─────────────────────────────────────────────────────
    - name: Upload node1 API source
      ansible.posix.synchronize:
        src: ../node1_api/
        dest: "{{ api_app_dir }}/"
        delete: true
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--chown=root:root"

    - name: Upload loadtest scripts
      ansible.posix.synchronize:
        src: ../loadtest/
        dest: "{{ loadtest_dir }}/"
        delete: true
        rsync_opts:
          - "--chown=root:root"

    # ── Python dependencies ───────────────────────────────────────────────
    - name: Ensure API venv exists
      ansible.builtin.command:
        cmd: "python3 -m venv {{ api_venv_path }}"
        creates: "{{ api_venv_path }}/bin/activate"

    - name: Install API dependencies into venv
      ansible.builtin.pip:
        requirements: "{{ api_app_dir }}/requirements.txt"
        virtualenv: "{{ api_venv_path }}"

    # ── Environment files ─────────────────────────────────────────────────
    - name: Create API environment file
      ansible.builtin.copy:
        dest: "{{ api_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          JOB_DB_PATH={{ sqlite_db_path }}
          REDIS_URL={{ redis_url }}
          SNMP_REDIS_URL={{ snmp_redis_url }}
          QUEUE_STREAM_KEY={{ queue_stream_key }}

    - name: Create SNMP collector environment file
      ansible.builtin.copy:
        dest: "{{ snmp_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          SNMP_REDIS_URL={{ snmp_redis_url }}
          NODE1_HOST=127.0.0.1
          NODE2_HOST={{ hostvars['node2']['private_ip'] | default('') }}
          SNMP_COMMUNITY=public
          SNMP_POLL_INTERVAL=5
          SNMP_RETENTION_HOURS={{ snmp_retention_hours }}

    - name: Create loadtest service environment file
      ansible.builtin.copy:
        dest: "{{ loadtest_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          SNMP_REDIS_URL={{ snmp_redis_url }}
          LOADTEST_SCRIPT_DIR={{ loadtest_dir }}
          LOADTEST_PORT={{ loadtest_port }}
          LOADTEST_BIND_HOST={{ loadtest_bind_host | default('127.0.0.1') }}

    - name: Create status consumer environment file
      ansible.builtin.copy:
        dest: "{{ status_consumer_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          JOB_DB_PATH={{ sqlite_db_path }}
          REDIS_URL={{ redis_url }}
          STATUS_STREAM_KEY={{ status_stream_key }}
          QUEUE_STREAM_KEY={{ queue_stream_key }}
          STATUS_GROUP={{ status_consumer_group }}
          STATUS_BLOCK_MS={{ status_consumer_block_ms }}

    - name: Create publish_failed_checker environment file
      ansible.builtin.copy:
        dest: "{{ publish_failed_checker_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          JOB_DB_PATH={{ sqlite_db_path }}
          REDIS_URL={{ redis_url }}
          QUEUE_STREAM_KEY={{ queue_stream_key }}
          STUCK_JOB_THRESHOLD_SEC={{ checker_stuck_threshold_sec }}
          LOG_FILE={{ publish_failed_checker_log_file }}

    # ── Service unit files ────────────────────────────────────────────────
    - name: Create systemd service for node1 API
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ api_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Node1 Flask API Service
          After=network.target redis-server.service

          [Service]
          Type=simple
          EnvironmentFile={{ api_env_file }}
          WorkingDirectory={{ api_app_dir }}
          ExecStart={{ api_venv_path }}/bin/gunicorn --workers 2 --bind 0.0.0.0:5000 app:app
          Restart=always
          RestartSec=3
          StandardOutput=append:{{ api_log_file }}
          StandardError=append:{{ api_log_file }}

          [Install]
          WantedBy=multi-user.target

    - name: Create systemd service for status consumer
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ status_consumer_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Node1 Status Consumer Service
          After=network.target redis-server.service {{ api_service_name }}.service

          [Service]
          Type=simple
          EnvironmentFile={{ status_consumer_env_file }}
          WorkingDirectory={{ api_app_dir }}
          ExecStart={{ api_venv_path }}/bin/python3 {{ api_app_dir }}/status_consumer.py
          Restart=always
          RestartSec=3
          StandardOutput=append:{{ status_consumer_log_file }}
          StandardError=append:{{ status_consumer_log_file }}

          [Install]
          WantedBy=multi-user.target

    - name: Create systemd service for SNMP collector
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ snmp_collector_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Mini-Orch SNMP Collector
          After=network.target redis-server.service

          [Service]
          Type=simple
          EnvironmentFile={{ snmp_env_file }}
          WorkingDirectory={{ api_app_dir }}
          ExecStart={{ api_venv_path }}/bin/python3 {{ api_app_dir }}/snmp_collector.py
          Restart=always
          RestartSec=5
          StandardOutput=append:{{ snmp_collector_log_file }}
          StandardError=append:{{ snmp_collector_log_file }}

          [Install]
          WantedBy=multi-user.target

    - name: Create systemd service for loadtest API
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ loadtest_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Mini-Orch Loadtest API
          After=network.target {{ api_service_name }}.service

          [Service]
          Type=simple
          EnvironmentFile={{ loadtest_env_file }}
          WorkingDirectory={{ api_app_dir }}
          ExecStart={{ api_venv_path }}/bin/python3 {{ api_app_dir }}/loadtest_server.py
          Restart=always
          RestartSec=3
          StandardOutput=append:{{ loadtest_log_file }}
          StandardError=append:{{ loadtest_log_file }}

          [Install]
          WantedBy=multi-user.target

    # ── Reload & start ────────────────────────────────────────────────────
    - name: Ensure all node1 services enabled and started
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: restarted
        daemon_reload: true
      loop:
        - redis-server
        - "{{ api_service_name }}"
        - "{{ status_consumer_service_name }}"
        - "{{ snmp_collector_service_name }}"
        - "{{ loadtest_service_name }}"

    # ── Cron ──────────────────────────────────────────────────────────────
    - name: Schedule publish_failed_checker via cron
      ansible.builtin.cron:
        name: mini-orch publish_failed_checker
        minute: "0"
        hour: "*"
        user: root
        job: >-
          /bin/bash -c 'set -a; source {{ publish_failed_checker_env_file }}; set +a;
          {{ api_venv_path }}/bin/python3 {{ api_app_dir }}/publish_failed_checker.py'
          >> $LOG_FILE 2>&1

- name: Deploy node2 stream worker binary
  hosts: node2
  become: true
  gather_facts: false
  vars:
    node1_redis_host: "{{ hostvars['node1']['private_ip'] | default('127.0.0.1') }}"
    redis_url: "{{ 'redis://:' ~ redis_password ~ '@' ~ node1_redis_host ~ ':6379/0' if (redis_password | length > 0) else 'redis://' ~ node1_redis_host ~ ':6379/0' }}"
    node2_local_redis_url: "{{ 'redis://:' ~ redis_password ~ '@127.0.0.1:6379/0' if (redis_password | length > 0) else 'redis://127.0.0.1:6379/0' }}"

  tasks:
    # ── Stop service ──────────────────────────────────────────────────────
    - name: Stop node2 worker before redeploy
      ansible.builtin.systemd:
        name: "{{ worker_service_name }}"
        state: stopped
      failed_when: false

    - name: Build worker binary
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: ./build.sh
        chdir: "{{ playbook_dir }}/../node2_worker"

    - name: Upload node2 worker binary
      ansible.builtin.copy:
        src: "{{ worker_binary_src }}"
        dest: "{{ worker_binary_dest }}"
        owner: root
        group: root
        mode: "0755"

    - name: Create node2 worker environment file
      ansible.builtin.copy:
        dest: "{{ worker_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          REDIS_URL={{ redis_url }}
          NODE2_REDIS_URL={{ node2_local_redis_url }}
          WORKER_LOG_FILE={{ worker_log_file }}
          QUEUE_STREAM_KEY={{ queue_stream_key }}
          QUEUE_GROUP={{ worker_queue_group }}
          QUEUE_CONSUMER={{ inventory_hostname }}
          QUEUE_BATCH_SIZE={{ worker_queue_batch_size }}
          QUEUE_BLOCK_MS={{ worker_queue_block_ms }}
          STATUS_STREAM_KEY={{ status_stream_key }}
          STATUS_FAILED_KEY={{ status_failed_key }}
          STATUS_DEAD_KEY={{ status_dead_key }}
          STATUS_RETRY_INTERVAL_MS={{ worker_status_retry_interval_ms }}
          FALLBACK_FILE={{ worker_fallback_file }}

    - name: Create systemd service for node2 worker
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ worker_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Node2 Redis Stream Worker
          After=network.target redis-server.service

          [Service]
          Type=simple
          EnvironmentFile={{ worker_env_file }}
          ExecStart={{ worker_binary_dest }}
          Restart=always
          RestartSec=3
          StandardOutput=append:{{ worker_log_file }}
          StandardError=append:{{ worker_log_file }}

          [Install]
          WantedBy=multi-user.target

    - name: Ensure node2 services enabled and started
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: restarted
        daemon_reload: true
      loop:
        - redis-server
        - "{{ worker_service_name }}"

