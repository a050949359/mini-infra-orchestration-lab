---
- name: Deploy node1 API service
  hosts: node1
  become: true
  gather_facts: false
  vars:
    redis_url: "{{ 'redis://:' ~ redis_password ~ '@127.0.0.1:6379/0' if (redis_password | length > 0) else 'redis://127.0.0.1:6379/0' }}"

  tasks:
    - name: Ensure SQLite backup directory exists
      ansible.builtin.file:
        path: "{{ sqlite_backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check existing SQLite database
      ansible.builtin.stat:
        path: "{{ sqlite_db_path }}"
      register: sqlite_db_stat

    - name: Backup SQLite database before redeploy
      ansible.builtin.copy:
        src: "{{ sqlite_db_path }}"
        dest: "{{ sqlite_backup_dir }}/jobs-{{ lookup('pipe', 'date +%Y%m%dT%H%M%S') }}.db"
        remote_src: true
        owner: root
        group: root
        mode: "0640"
      when: sqlite_db_stat.stat.exists

    - name: Remove API app directory for clean redeploy
      ansible.builtin.file:
        path: "{{ api_app_dir }}"
        state: absent

    - name: Ensure API app directory exists
      ansible.builtin.file:
        path: "{{ api_app_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Upload node1 API source
      ansible.posix.synchronize:
        src: ../node1_api/
        dest: "{{ api_app_dir }}/"
        delete: true
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--chown=root:root"

    - name: Upload loadtest scripts
      ansible.posix.synchronize:
        src: ../loadtest/
        dest: "{{ loadtest_dir }}/"
        delete: true
        rsync_opts:
          - "--chown=root:root"

    - name: Ensure API venv exists
      ansible.builtin.command:
        cmd: "python3 -m venv {{ api_venv_path }}"
        creates: "{{ api_venv_path }}/bin/activate"

    - name: Install API dependencies into venv
      ansible.builtin.pip:
        requirements: "{{ api_app_dir }}/requirements.txt"
        virtualenv: "{{ api_venv_path }}"

    - name: Ensure Gunicorn is installed in API venv
      ansible.builtin.pip:
        name: gunicorn
        virtualenv: "{{ api_venv_path }}"

    - name: Create API environment file
      ansible.builtin.copy:
        dest: "{{ api_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          JOB_DB_PATH={{ sqlite_db_path }}
          REDIS_URL={{ redis_url }}
          QUEUE_STREAM_KEY={{ queue_stream_key }}
          STATUS_STREAM_KEY={{ status_stream_key }}
          STATUS_GROUP={{ status_consumer_group }}
          STATUS_BLOCK_MS={{ status_consumer_block_ms }}

    - name: Remove API data directory for clean redeploy
      ansible.builtin.file:
        path: "{{ api_data_dir }}"
        state: absent

    - name: Ensure API data directory exists
      ansible.builtin.file:
        path: "{{ api_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create systemd service for node1 API
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ api_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Node1 Flask API Service
          After=network.target redis-server.service

          [Service]
          Type=simple
          EnvironmentFile={{ api_env_file }}
          WorkingDirectory={{ api_app_dir }}
          ExecStart={{ api_venv_path }}/bin/gunicorn --workers 2 --bind 0.0.0.0:5000 app:app
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
      notify: Restart node1 API

    - name: Stop and disable legacy node1-api service if present
      ansible.builtin.systemd:
        name: node1-api
        enabled: false
        state: stopped
      failed_when: false

    - name: Stop and disable legacy node1-api.service unit if present
      ansible.builtin.systemd:
        name: node1-api.service
        enabled: false
        state: stopped
      failed_when: false

    - name: Stop and disable current API service before restart
      ansible.builtin.systemd:
        name: "{{ api_service_name }}"
        state: stopped
      failed_when: false

    - name: Kill any process listening on port 5000
      ansible.builtin.shell: |
        set -o pipefail
        pids=$(ss -ltnp '( sport = :5000 )' | awk -F 'pid=' 'NR>1 && NF>1 {split($2,a,",|"); print a[1]}' | sort -u)
        if [[ -n "$pids" ]]; then
          kill -9 $pids
        fi
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Ensure node1 API service enabled and started
      ansible.builtin.systemd:
        name: "{{ api_service_name }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Schedule publish_failed_checker via cron
      ansible.builtin.cron:
        name: mini-orch publish_failed_checker
        minute: "0"
        hour: "*"
        user: root
        job: >-
          /bin/bash -c 'set -a; source {{ api_env_file }}; set +a;
          {{ api_venv_path }}/bin/python3 {{ api_app_dir }}/publish_failed_checker.py'
          >> /var/log/mini-orch/publish_failed_checker.log 2>&1

    - name: Create systemd service for status consumer
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ status_consumer_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Node1 Status Consumer Service
          After=network.target redis-server.service {{ api_service_name }}.service

          [Service]
          Type=simple
          EnvironmentFile={{ api_env_file }}
          WorkingDirectory={{ api_app_dir }}
          ExecStart={{ api_venv_path }}/bin/python3 {{ api_app_dir }}/status_consumer.py
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
      notify: Restart status consumer

    - name: Ensure status consumer service enabled and started
      ansible.builtin.systemd:
        name: "{{ status_consumer_service_name }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Create loadtest service environment file
      ansible.builtin.copy:
        dest: "{{ loadtest_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          NODE1_HOST=127.0.0.1
          NODE2_HOST={{ hostvars['node2']['private_ip'] | default('') }}
          SNMP_COMMUNITY=public
          SNMP_POLL_INTERVAL=5
          LOADTEST_SCRIPT_DIR={{ loadtest_dir }}
          LOADTEST_PORT={{ loadtest_port }}
          LOADTEST_BIND_HOST={{ loadtest_bind_host | default('127.0.0.1') }}

    - name: Create systemd service for loadtest API
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ loadtest_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Mini-Orch Loadtest API
          After=network.target {{ api_service_name }}.service

          [Service]
          Type=simple
          EnvironmentFile={{ loadtest_env_file }}
          WorkingDirectory={{ api_app_dir }}
          ExecStart={{ api_venv_path }}/bin/python3 {{ api_app_dir }}/loadtest_server.py
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
      notify: Restart loadtest API

    - name: Ensure loadtest API service enabled and started
      ansible.builtin.systemd:
        name: "{{ loadtest_service_name }}"
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart node1 API
      ansible.builtin.systemd:
        name: "{{ api_service_name }}"
        state: restarted
        daemon_reload: true

    - name: Restart status consumer
      ansible.builtin.systemd:
        name: "{{ status_consumer_service_name }}"
        state: restarted

    - name: Restart loadtest API
      ansible.builtin.systemd:
        name: "{{ loadtest_service_name }}"
        state: restarted
        daemon_reload: true

- name: Deploy node2 stream worker binary
  hosts: node2
  become: true
  gather_facts: false
  vars:
    node1_redis_host: "{{ hostvars['node1']['private_ip'] | default('127.0.0.1') }}"
    redis_url: "{{ 'redis://:' ~ redis_password ~ '@' ~ node1_redis_host ~ ':6379/0' if (redis_password | length > 0) else 'redis://' ~ node1_redis_host ~ ':6379/0' }}"

  tasks:
    - name: Check worker binary exists on control node
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ worker_binary_src }}"
      register: worker_binary_stat

    - name: Fail if worker binary is missing
      delegate_to: localhost
      become: false
      ansible.builtin.fail:
        msg: "Missing worker binary: {{ worker_binary_src }}. Build it first: ./node2_worker/build.sh"
      when: not worker_binary_stat.stat.exists

    - name: Upload node2 worker binary
      ansible.builtin.copy:
        src: "{{ worker_binary_src }}"
        dest: "{{ worker_binary_dest }}"
        owner: root
        group: root
        mode: "0755"

    - name: Create node2 worker environment file
      ansible.builtin.copy:
        dest: "{{ worker_env_file }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          REDIS_URL={{ redis_url }}
          NODE2_REDIS_URL=redis://localhost:6379/0
          WORKER_LOG_FILE={{ worker_log_file }}
          QUEUE_STREAM_KEY={{ queue_stream_key }}
          QUEUE_GROUP={{ worker_queue_group }}
          QUEUE_CONSUMER={{ inventory_hostname }}
          QUEUE_BATCH_SIZE={{ worker_queue_batch_size }}
          QUEUE_BLOCK_MS={{ worker_queue_block_ms }}
          STATUS_STREAM_KEY={{ status_stream_key }}
          STATUS_FAILED_KEY={{ status_failed_key }}
          STATUS_RETRY_INTERVAL_MS={{ worker_status_retry_interval_ms }}

    - name: Create systemd service for node2 worker
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ worker_service_name }}.service"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Node2 Redis Stream Worker
          After=network.target redis-server.service

          [Service]
          Type=simple
          EnvironmentFile={{ worker_env_file }}
          ExecStart={{ worker_binary_dest }}
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
      notify: Restart node2 worker

    - name: Ensure node2 worker service enabled and started
      ansible.builtin.systemd:
        name: "{{ worker_service_name }}"
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart node2 worker
      ansible.builtin.systemd:
        name: "{{ worker_service_name }}"
        state: restarted
        daemon_reload: true
